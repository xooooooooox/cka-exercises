name: Task-fix → draft PR

# Manual-only. Maintainer triggers from the Actions tab.
# Two run modes:
#   - Single: pass `issue_number`; processes exactly that one.
#   - Batch:  leave `issue_number` blank; the workflow discovers every open
#             issue carrying the `task-fix` label that doesn't already have
#             a draft PR branch upstream, capped by `max_issues`.
#
# Mirrors `answer-fix-pr.yml` but operates on issues filed by the SPA's
# "🐛 Suggest a fix for this task or docs" button. The aider edit target is
# the `> 🔗` docs-link block or the task-body prose (NOT the reference
# solution), driven by `.github/task-fix/prompt.md`.

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue # to triage. Leave blank to BATCH-process every open task-fix issue.'
        required: false
        type: string
      provider:
        description: 'LLM provider for the fix.'
        required: true
        default: copilot
        type: choice
        options:
          - copilot
          - anthropic
          - openai
          - deepseek
          - qwen
          - doubao
          - glm
          - ollama
      model:
        description: 'Model id (blank = per-provider default).'
        required: false
        type: string
      max_issues:
        description: 'Safety cap for batch mode (default 10).'
        required: false
        default: '10'
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  models: read

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      issues: ${{ steps.list.outputs.issues }}
    steps:
      - uses: actions/checkout@v4
      - name: Ensure repo labels exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          create() {
            gh label create "$1" --description "$2" --color "$3" --force >/dev/null 2>&1 || true
          }
          # task-fix is red; the seven kind/* dispatch labels share a yellow hue.
          # `kind/other` is already created by answer-fix; --force is idempotent.
          create "task-fix"                   "Task / docs problem reported via the SPA"        "d73a4a"
          create "kind/missing-docs-link"     "Task is missing a relevant kubernetes.io link"   "fbca04"
          create "kind/incorrect-docs-link"   "Existing docs link points to the wrong page"     "fbca04"
          create "kind/outdated-breadcrumb"   "Docs link's breadcrumb text drifted"             "fbca04"
          create "kind/unclear-task"          "Task wording is ambiguous or unclear"            "fbca04"
          create "kind/factual-error"         "Task contains a factual error about Kubernetes"  "fbca04"
          create "kind/typo-task"             "Typo / formatting issue in the task body"        "fbca04"
          create "kind/other"                 "Other (described in issue body)"                 "fbca04"
      - id: list
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_INPUT: ${{ inputs.issue_number }}
          MAX_ISSUES: ${{ inputs.max_issues }}
        run: |
          set -euo pipefail
          if [ -n "$ISSUE_INPUT" ]; then
            echo "issues=[$ISSUE_INPUT]" >> "$GITHUB_OUTPUT"
            { echo "### Discovered issues"; echo "Single: [$ISSUE_INPUT]"; } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          ALL=$(gh issue list --state open --label task-fix \
                  --limit "$MAX_ISSUES" --json number -q '.[].number')
          PICKED=()
          for N in $ALL; do
            # Skip if a draft PR already references this issue. Looser than the
            # old "branch exists" check — re-runs after a stranded-branch
            # incident still pick the issue up.
            if [ -n "$(gh pr list --state open --search "Fixes #${N} in:body" --json number -q '.[0].number')" ]; then
              continue
            fi
            PICKED+=("$N")
          done
          if [ "${#PICKED[@]}" -eq 0 ]; then
            JSON='[]'
          else
            JSON=$(printf '[%s]' "$(IFS=,; echo "${PICKED[*]}")")
          fi
          echo "issues=$JSON" >> "$GITHUB_OUTPUT"
          { echo "### Discovered issues"; echo "Picked: $JSON"; } >> "$GITHUB_STEP_SUMMARY"

  process:
    needs: discover
    if: needs.discover.outputs.issues != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        issue: ${{ fromJson(needs.discover.outputs.issues) }}
    env:
      ISSUE: ${{ matrix.issue }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate label
        run: |
          set -euo pipefail
          gh issue view "$ISSUE" --json title,body,labels,number > /tmp/issue.json
          jq -e '.labels | map(.name) | index("task-fix")' /tmp/issue.json >/dev/null \
            || { gh issue comment "$ISSUE" --body "🚫 The \`task-fix\` label is required to run this workflow."; exit 1; }

      - name: Skip if a PR already exists for this issue
        run: |
          set -euo pipefail
          # Looser than "branch exists" — re-runs after a stranded-branch
          # incident (push succeeded but `gh pr create` was blocked) still
          # pick the issue up.
          PR_URL=$(gh pr list --state open --search "Fixes #${ISSUE} in:body" --json url -q '.[0].url')
          if [ -n "$PR_URL" ]; then
            gh issue comment "$ISSUE" --body "ℹ️ A draft PR already exists for this issue: ${PR_URL}. Skipping."
            echo "skip=1" >> "$GITHUB_ENV"
          fi

      - name: Extract context (env)
        if: env.skip != '1'
        run: |
          set -euo pipefail
          node scripts/answer-fix/extract-context.mjs --env < /tmp/issue.json > /tmp/ctx.env
          cat /tmp/ctx.env >> "$GITHUB_ENV"

      - name: Render prompt
        if: env.skip != '1'
        run: |
          set -euo pipefail
          node scripts/answer-fix/extract-context.mjs \
            --prompt-template .github/task-fix/prompt.md < /tmp/issue.json > /tmp/prompt.md

      - name: Resolve provider routing
        if: env.skip != '1'
        id: route
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY:      ${{ secrets.QWEN_API_KEY }}
          DOUBAO_API_KEY:    ${{ secrets.DOUBAO_API_KEY }}
          GLM_API_KEY:       ${{ secrets.GLM_API_KEY }}
          PROVIDER:          ${{ inputs.provider }}
          MODEL_INPUT:       ${{ inputs.model }}
        run: |
          set -eo pipefail
          M=""; B=""; K=""; KENV=""
          case "$PROVIDER" in
            copilot)
              # gpt-4o (not -mini) — small models fixated on the first edit and
              # missed multi-action issues like #10/PR#11. gpt-4o handles
              # numbered-list issues + prose-to-multiline-code mapping reliably.
              M="openai/gpt-4o"
              B="https://models.github.ai/inference"
              K="${{ github.token }}"
              KENV="OPENAI_API_KEY";;
            anthropic)
              M="anthropic/claude-opus-4-7"
              K="$ANTHROPIC_API_KEY"; KENV="ANTHROPIC_API_KEY";;
            openai)
              M="openai/gpt-4o"
              K="$OPENAI_API_KEY"; KENV="OPENAI_API_KEY";;
            deepseek)
              M="deepseek/deepseek-chat"
              K="$DEEPSEEK_API_KEY"; KENV="DEEPSEEK_API_KEY";;
            qwen)
              M="openai/qwen-max"
              B="https://dashscope.aliyuncs.com/compatible-mode/v1"
              K="$QWEN_API_KEY"; KENV="OPENAI_API_KEY";;
            doubao)
              M="openai/doubao-pro-32k"
              B="https://ark.cn-beijing.volces.com/api/v3"
              K="$DOUBAO_API_KEY"; KENV="OPENAI_API_KEY";;
            glm)
              M="openai/glm-4-plus"
              B="https://open.bigmodel.cn/api/paas/v4"
              K="$GLM_API_KEY"; KENV="OPENAI_API_KEY";;
            ollama)
              M="ollama/llama3.1"
              B="http://localhost:11434"
              K="dummy"; KENV="OPENAI_API_KEY";;
          esac
          [ -n "$MODEL_INPUT" ] && M="$MODEL_INPUT"
          if [ -z "$K" ] && [ "$PROVIDER" != "ollama" ]; then
            gh issue comment "$ISSUE" --body "🚫 Provider \`${PROVIDER}\` selected but its API key secret is missing. Add the corresponding \`*_API_KEY\` to repo secrets or pick a different provider."
            exit 1
          fi
          echo "model=$M" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$K"
          echo "${KENV}=$K" >> "$GITHUB_ENV"
          if [ -n "$B" ]; then echo "OPENAI_API_BASE=$B" >> "$GITHUB_ENV"; fi

      - name: Extract H3 snippet
        if: env.skip != '1'
        run: |
          set -eo pipefail
          node scripts/answer-fix/h3-range.mjs \
            --extract --source="$SOURCE_FILE" --id="$EXERCISE_ID" \
            > /tmp/snippet.md
          echo "Snippet: $(wc -l < /tmp/snippet.md) lines, $(wc -c < /tmp/snippet.md) bytes."
          echo "::group::Snippet preview"
          head -40 /tmp/snippet.md
          echo "::endgroup::"

      - name: Install aider
        if: env.skip != '1'
        run: pipx install aider-chat

      - name: Run aider
        if: env.skip != '1'
        id: aider
        run: |
          set +e
          aider \
            --model "${{ steps.route.outputs.model }}" \
            --message "$(cat /tmp/prompt.md)" \
            --yes-always \
            --no-auto-commits \
            --no-stream \
            --no-gitignore \
            --map-tokens 0 \
            --no-detect-urls \
            /tmp/snippet.md \
            > /tmp/aider.log 2>&1
          RC=$?
          echo "exit_code=$RC" >> "$GITHUB_OUTPUT"
          set -e
          {
            echo "### Aider run"
            echo
            echo "- provider: \`${{ inputs.provider }}\`"
            echo "- model: \`${{ steps.route.outputs.model }}\`"
            echo "- exit code: \`$RC\`"
            echo
            echo '```'
            tail -200 /tmp/aider.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          tail -80 /tmp/aider.log

      - name: Upload aider log
        if: always() && env.skip != '1'
        uses: actions/upload-artifact@v4
        with:
          name: aider-log-issue-${{ env.ISSUE }}
          path: /tmp/aider.log
          if-no-files-found: warn
          retention-days: 14

      - name: Fail loudly if aider crashed or hit the model
        if: env.skip != '1'
        run: |
          if [ "${{ steps.aider.outputs.exit_code }}" != "0" ]; then
            gh issue comment "$ISSUE" --body "🚨 The editor (aider, provider=\`${{ inputs.provider }}\`, model=\`${{ steps.route.outputs.model }}\`) crashed with exit code ${{ steps.aider.outputs.exit_code }}. See the run's \`aider-log-issue-${ISSUE}\` artifact for the full log."
            exit 1
          fi
          # Aider exits 0 even when litellm exhausts retries on a doomed request.
          # Catch those patterns explicitly so we surface a real failure instead
          # of silently flowing through `Bail if no changes` (which then mis-blames
          # the prompt).
          if grep -qE "Request body too large|litellm\.APIError|APIError: OpenAIException|Rate limit" /tmp/aider.log; then
            gh issue comment "$ISSUE" --body "🚨 The model \`${{ steps.route.outputs.model }}\` rejected the request (token cap, rate limit, or auth). Try a different provider/model. Log excerpt is in the run's \`aider-log-issue-${ISSUE}\` artifact."
            exit 1
          fi

      - name: Splice H3 snippet back
        if: env.skip != '1'
        run: |
          set -eo pipefail
          node scripts/answer-fix/h3-range.mjs \
            --splice --source="$SOURCE_FILE" --id="$EXERCISE_ID" \
            --snippet=/tmp/snippet.md

      - name: Bail if no changes
        if: env.skip != '1'
        run: |
          set -eo pipefail
          if git diff --quiet; then
            BODY="🤷 No obvious fix to apply (provider=${{ inputs.provider }}, model=${{ steps.route.outputs.model }}). Please review manually."$'\n\n'"<details><summary>Editor log</summary>"$'\n\n'"\`\`\`"$'\n'"$(tail -80 /tmp/aider.log)"$'\n'"\`\`\`"$'\n\n'"</details>"
            gh issue comment "$ISSUE" --body "$BODY"
            echo "skip=1" >> "$GITHUB_ENV"
          fi

      - name: Bail if the edit is whitespace-only (likely unrelated to the issue)
        if: env.skip != '1'
        run: |
          set -eo pipefail
          # `git diff --ignore-all-space --ignore-blank-lines --quiet` exits 0
          # when the diff contains only whitespace / blank-line changes. That's
          # almost always an aider hallucination — see PR #8 (`kind=other`,
          # ca-1-002, deleted the inter-H3 separator).
          if git diff --ignore-all-space --ignore-blank-lines --quiet; then
            BODY="🤷 The editor's only change was whitespace / blank-line — almost certainly unrelated to the reported issue (the splice already normalises inter-H3 separators on its own). Skipping PR; please review the issue manually."$'\n\n'"<details><summary>Editor log</summary>"$'\n\n'"\`\`\`"$'\n'"$(tail -80 /tmp/aider.log)"$'\n'"\`\`\`"$'\n\n'"</details>"
            gh issue comment "$ISSUE" --body "$BODY"
            git checkout -- .
            echo "skip=1" >> "$GITHUB_ENV"
          fi

      - name: Tighten file scope
        if: env.skip != '1'
        run: |
          set -eo pipefail
          CHANGED=$(git diff --name-only | sort -u)
          EXPECTED="${SOURCE_FILE}"
          if [ "$CHANGED" != "$EXPECTED" ]; then
            gh issue comment "$ISSUE" --body "🚫 The editor touched files outside \`${EXPECTED}\`:"$'\n\n'"\`\`\`"$'\n'"$CHANGED"$'\n'"\`\`\`"$'\n\n'"Reverted."
            git checkout -- .
            exit 1
          fi

      - name: Lint + build (guardrail)
        if: env.skip != '1'
        run: |
          node scripts/lint-exercises.mjs
          node scripts/build-exercises.mjs

      - name: Open draft PR
        if: env.skip != '1'
        run: |
          set -eo pipefail
          BRANCH="task-fix/${ISSUE}-${EXERCISE_ID}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add exercises/
          git commit -m "fix(corpus): #${ISSUE} ${ISSUE_TYPE} — ${EXERCISE_ID}"
          # If the branch already exists upstream (stranded from a previous
          # run where `gh pr create` was blocked), `--force-with-lease`
          # overwrites only if no one else has pushed to it.
          git push origin "$BRANCH" || git push --force-with-lease origin "$BRANCH"
          BODY="Fixes #${ISSUE}."$'\n\n'"Auto-drafted via aider (provider=${{ inputs.provider }}, model=${{ steps.route.outputs.model }})."$'\n'"Maintainer review required — verify the breadcrumb text + URL match kubernetes.io's current navigation."$'\n\n'"<details><summary>Editor log</summary>"$'\n\n'"\`\`\`"$'\n'"$(tail -80 /tmp/aider.log)"$'\n'"\`\`\`"$'\n\n'"</details>"
          if ! PR_URL=$(gh pr create --draft --base main --head "$BRANCH" \
              --title "fix(corpus): #${ISSUE} ${ISSUE_TYPE} — ${EXERCISE_ID}" \
              --body "$BODY" 2>/tmp/pr-create.err); then
            REPO="${{ github.repository }}"
            if grep -q "not permitted to create or approve pull requests" /tmp/pr-create.err; then
              MSG="🚨 PR creation blocked by a repo policy. Enable **Settings → Actions → General → Workflow permissions → \"Allow GitHub Actions to create and approve pull requests\"**, then either re-trigger this workflow or open the PR manually from this link (branch is already pushed):"$'\n\n'"https://github.com/${REPO}/pull/new/${BRANCH}"
              gh issue comment "$ISSUE" --body "$MSG"
            else
              gh issue comment "$ISSUE" --body "🚨 \`gh pr create\` failed:"$'\n\n'"\`\`\`"$'\n'"$(cat /tmp/pr-create.err)"$'\n'"\`\`\`"$'\n\n'"Branch \`${BRANCH}\` is pushed; open the PR manually from https://github.com/${REPO}/pull/new/${BRANCH}"
            fi
            exit 1
          fi
          gh issue comment "$ISSUE" --body "🤖 Draft PR opened: ${PR_URL}"

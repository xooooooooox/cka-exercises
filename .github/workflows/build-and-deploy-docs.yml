name: Build and deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'exercises/**'
      - 'docs/**'
      - 'scripts/build-exercises.mjs'
      - 'scripts/build-kubectl-tools.mjs'
      - 'scripts/build-kubectl-help.mjs'
      - 'scripts/lint-exercises.mjs'
      - 'WEBAPP_GUIDE.md'
      - 'WEBAPP_GUIDE_CN.md'
      - '.github/workflows/build-and-deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # kubectl is needed by scripts/build-kubectl-help.mjs to capture the
      # verbatim `kubectl <cmd> -h` output bundled into the Tools tab.
      # Pin to the CKA-curriculum version so deploys are reproducible.
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.34.0'
      - name: Lint exercises markdown
        run: node scripts/lint-exercises.mjs
      - name: Build exercises.json
        run: node scripts/build-exercises.mjs
      - name: Build kubectl help bundle
        run: node scripts/build-kubectl-help.mjs
      - name: Build tools.json (explain + kubectl)
        run: node scripts/build-kubectl-tools.mjs
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

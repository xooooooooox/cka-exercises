name: Lint

on:
  push:
    branches-ignore: [main]
    paths:
      - 'exercises/**'
      - 'scripts/lint-exercises.mjs'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - 'exercises/**'
      - 'scripts/lint-exercises.mjs'
      - '.github/workflows/lint.yml'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Lint exercises markdown
        run: node scripts/lint-exercises.mjs
      - name: Verify build still works
        run: node scripts/build-exercises.mjs
